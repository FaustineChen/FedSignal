# openPostgreSQL container
services:
  postgres:
    image: postgres:16
    container_name: fedsignal-postgres
    environment:
      POSTGRES_USER: fedsignal
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fedsignal_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: